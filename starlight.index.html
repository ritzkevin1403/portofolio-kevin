<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlight UMN | Kevin Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS-nya sama persis biar konsisten */
        :root { --bg: #050507; --card: rgba(18, 18, 20, 0.8); --accent: #007aff; --text: #ffffff; --text-dim: #a1a1a6; --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .content-wrapper { max-width: 600px; width: 100%; display: flex; flex-direction: column; align-items: center; text-align: center; background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .logo-project { width: 150px; height: auto; border-radius: 15px; margin-bottom: 25px; }
        h1 { font-size: 2rem; margin: 10px 0; color: var(--accent); }
        p { color: var(--text-dim); line-height: 1.6; font-size: 1.05rem; margin-bottom: 20px; }
        .btn-back { display: inline-flex; align-items: center; gap: 10px; margin-top: 20px; padding: 12px 28px; background: var(--accent); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn-back:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3); }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <img src="Starlight.jpeg" alt="Logo Starlight" class="logo-project">
        <h1>Starlight UMN 2025</h1>
        <p>
            <strong>Starlight UMN</strong> adalah salah satu acara seni dan kreativitas terbesar di Universitas Multimedia Nusantara yang menampilkan bakat-bakat luar biasa dari mahasiswa.
        </p>
        <a href="index.html#experience" class="btn-back">
            <i class="fas fa-arrow-left"></i> Kembali ke Portofolio
        </a>
    </div>
</body>
</html>
