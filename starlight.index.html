<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin | Starlight UMN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050507;
            --card: rgba(18, 18, 20, 0.9);
            --accent: #007aff;
            --text: #ffffff;
            --text-dim: #a1a1a6;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--bg);
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px),
                /* Overlay 0.9 biar teks deskripsi acaranya tetap stand out */
                linear-gradient(rgba(5, 5, 7, 0.9), rgba(5, 5, 7, 0.9)), 
                url('Foto Starlight (2).jpeg'); 
            background-size: 40px 40px, 40px 40px, cover, cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            line-height: 1.6;
        }

        /* KOTAK KONTEN UTAMA */
        .page {
            max-width: 750px;
            margin: 0 auto;
            padding: 80px 20px 100px;
        }

        .card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 28px; 
            border: 1px solid var(--border); 
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .logo-img {
            width: 140px;
            height: auto;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        h1 { font-size: 2.2rem; color: var(--accent); margin-bottom: 15px; }
        
        p { color: var(--text-dim); margin-bottom: 30px; text-align: center; font-size: 1.05rem; }

        /* TOMBOL BIRU DI BAWAH */
        .btn-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }

        .btn-link:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 30px rgba(0, 122, 255, 0.5); 
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .card { padding: 30px 20px; }
            .page { padding-top: 60px; }
        }
    </style>
</head>
<body>

    <main class="page">
        <div class="card">
            <img src="Starlight.jpeg" class="logo-img" alt="Logo Starlight">
            
            <h1>Starlight UMN 2025</h1>
            
            <p>
                <strong>Starlight UMN</strong> adalah salah satu acara seni dan kreativitas terbesar di Universitas Multimedia Nusantara yang menampilkan bakat-bakat luar biasa dari mahasiswa.
            </p>

            <a href="index.html#experience" class="btn-link">
                <i class="fas fa-arrow-left"></i> Kembali ke Portofolio
            </a>
        </div>
    </main>

</body>
</html>
